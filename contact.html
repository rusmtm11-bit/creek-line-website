<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Creek Line Limited</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo-text">CREEK LINE LIMITED</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <h2 class="section-title">Start a Conversation</h2>
      <p class="section-subtitle">Tell us about your project. We’ll respond within 24 hours.</p>

      <form class="contact-form" action="#" method="POST">
        <div class="form-group">
          <input type="text" id="name" placeholder=" " required>
          <label for="name">Full Name</label>
        </div>
        <div class="form-group">
          <input type="email" id="email" placeholder=" " required>
          <label for="email">Email Address</label>
        </div>
        <div class="form-group">
          <input type="text" id="subject" placeholder=" " required>
          <label for="subject">Subject</label>
        </div>
        <div class="form-group">
          <textarea id="message" placeholder=" " required></textarea>
          <label for="message">Your Message</label>
        </div>
        <button type="submit" class="btn btn-primary btn-submit">Send Message</button>
      </form>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Creek Line Limited. All rights reserved. | <a href="index.html">Home</a></p>
    </div>
  </footer>
</body>
</html>
