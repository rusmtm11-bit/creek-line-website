<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Creek Line Limited</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    /* Дополнительные стили для центрирования и анимации */
    .thankyou-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
    }
    .thankyou-icon {
      font-size: 5rem;
      margin-bottom: 2rem;
      color: var(--accent-bright);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }
    .thankyou-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--accent-dark);
    }
    .thankyou-message {
      font-size: 1.2rem;
      color: var(--text-light);
      max-width: 500px;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo-text">CREEK LINE LIMITED</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <section class="section">
    <div class="container thankyou-section">
      <div class="thankyou-icon">✓</div>
      <h1 class="thankyou-title">Thank You for Reaching Out</h1>
      <p class="thankyou-message">Your message has been received. Our team will review it and get back to you shortly. We typically respond within 24 hours.</p>
      <a href="index.html" class="btn btn-primary">Return to Home</a>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Creek Line Limited. All rights reserved. | <a href="contact.html">Contact</a></p>
    </div>
  </footer>
</body>
</html>
